name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: runai-linux-amd64.tar.gz
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: runai-linux-arm64.tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: runai-darwin-amd64.tar.gz
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: runai-darwin-arm64.tar.gz
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: runai-windows-amd64.zip
            cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package (tar.gz)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.asset }} runai
          cd ../../..

      - name: Package (zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/runai.exe -DestinationPath ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum runai-*.tar.gz runai-*.zip > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes \
            runai-*.tar.gz runai-*.zip checksums.txt
